name: Deploy to CloudFront

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  AWS_ACCOUNT_ID: '551655797952'
  AWS_ROLE_NAME: github-repo-oidc-vitality-shadcn
  S3_BUCKET: shadcn-551655797952-us-east-1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build registry
        run: npm run registry:build

      - name: Build Angular registry
        run: npm run registry:build:ng

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: ''
          NEXT_PUBLIC_REGISTRY_URL: ${{ vars.CLOUDFRONT_URL }}

      - name: Build Storybook
        run: npm run storybook:build
        env:
          NEXT_PUBLIC_REGISTRY_URL: ${{ vars.CLOUDFRONT_URL }}

      - name: Copy Storybook to output
        run: cp -r storybook-static out/storybook

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: build-output
          path: out

  cdk-deploy:
    runs-on: ubuntu-latest
    needs: build
    outputs:
      distribution-id: ${{ steps.cdk-output.outputs.distribution-id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cdk/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/${{ env.AWS_ROLE_NAME }}
          aws-region: us-east-1

      - name: Install CDK dependencies
        run: cd cdk && npm ci

      - name: CDK deploy
        run: cd cdk && npx cdk deploy --all --require-approval never --outputs-file cdk-outputs.json
        env:
          ENVIRONMENT: production
          DEPLOYMENT: ''
          DEPLOYMENT_JOB: ${{ github.run_id }}
          CREATED_BY: github-actions
          VERSION: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}

      - name: Extract CDK outputs
        id: cdk-output
        run: |
          DIST_ID=$(jq -r '[.[]] | .[0].DistributionId' cdk/cdk-outputs.json)
          if [ -z "$DIST_ID" ] || [ "$DIST_ID" = "null" ]; then
            echo "::error::Failed to extract distribution ID from CDK outputs"
            exit 1
          fi
          echo "distribution-id=$DIST_ID" >> "$GITHUB_OUTPUT"

  s3-sync:
    runs-on: ubuntu-latest
    needs: [build, cdk-deploy]
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/${{ env.AWS_ROLE_NAME }}
          aws-region: us-east-1

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: build-output
          path: out

      - name: Sync to S3
        run: aws s3 sync out/ s3://${{ env.S3_BUCKET }} --delete

  invalidate:
    runs-on: ubuntu-latest
    needs: [cdk-deploy, s3-sync]
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/${{ env.AWS_ROLE_NAME }}
          aws-region: us-east-1

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ needs.cdk-deploy.outputs.distribution-id }} \
            --paths "/*"
